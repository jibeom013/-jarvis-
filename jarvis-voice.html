<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { font-family: 'Segoe UI'; background: #000000; display: flex; justify-content: center; align-items: center; }
        .container { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
        canvas { position: absolute; top: 0; left: 0; display: block; }
        .permission-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px); }
        .permission-modal.hidden { display: none; }
        .permission-content { text-align: center; background: rgba(10, 14, 39, 0.8); border: 2px solid #00d4ff; border-radius: 20px; padding: 50px 40px; max-width: 500px; box-shadow: 0 0 30px rgba(0, 212, 255, 0.3); }
        .permission-title { font-size: 2em; color: #00d4ff; margin-bottom: 20px; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); letter-spacing: 2px; }
        .permission-text { color: #8ab4f8; font-size: 1.1em; margin-bottom: 15px; line-height: 1.6; }
        .permission-description { color: rgba(138, 180, 248, 0.7); font-size: 0.95em; margin-bottom: 30px; line-height: 1.5; }
        .permission-button { background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(0, 212, 255, 0.1)); border: 2px solid #00d4ff; color: #00d4ff; padding: 15px 40px; font-size: 1.05em; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0, 212, 255, 0.3); }
        .permission-button:hover { background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(0, 212, 255, 0.2)); box-shadow: 0 0 20px rgba(0, 212, 255, 0.6); transform: scale(1.05); }
        .permission-icon { font-size: 4em; margin-bottom: 20px; }
        .content { position: relative; z-index: 10; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .particle-sphere { width: 300px; height: 300px; position: relative; }
        .response-text { font-size: 1.2em; color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5), 0 0 20px rgba(0, 212, 255, 0.3); letter-spacing: 2px; font-weight: 300; animation: fadeIn 0.5s ease-in; line-height: 1.6; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .status-indicator { position: fixed; top: 30px; right: 30px; width: 12px; height: 12px; border-radius: 50%; background: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.5); animation: pulse 2s infinite; z-index: 20; }
        .status-indicator.listening { animation: pulseListen 0.8s infinite; background: #ff4444; }
        @keyframes pulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }
        @keyframes pulseListen { 0%, 100% { box-shadow: 0 0 10px rgba(255, 68, 68, 0.5); } 50% { box-shadow: 0 0 30px rgba(255, 68, 68, 0.8); } }
        .title { position: fixed; top: 30px; left: 30px; font-size: 1.5em; color: #00d4ff; text-shadow: 0 0 10px rgba(0, 212, 255, 0.5); letter-spacing: 4px; z-index: 20; }
        .input-text { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.5); color: #8ab4f8; padding: 12px 20px; border-radius: 5px; font-size: 0.9em; width: 90%; max-width: 400px; text-align: center; min-height: 40px; z-index: 20; font-family: 'Courier New', monospace; }
        .hint { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); color: rgba(138, 180, 248, 0.5); font-size: 0.85em; z-index: 20; text-align: center; }
        .frequency-bar { position: fixed; bottom: 20px; left: 20px; z-index: 20; }
        .bar { width: 3px; height: 40px; background: rgba(0, 212, 255, 0.3); border: 1px solid rgba(0, 212, 255, 0.5); display: inline-block; margin-right: 2px; border-radius: 2px; }
        .bar.active { background: #00d4ff; box-shadow: 0 0 10px rgba(0, 212, 255, 0.8); }
    </style>
</head>
<body>
    <div class="permission-modal" id="permissionModal">
        <div class="permission-content">
            <div class="permission-icon">🎤</div>
            <div class="permission-title">음성 인식 권한 필요</div>
            <div class="permission-text">JARVIS를 사용하려면 음성 인식 권한이 필요합니다</div>
            <div class="permission-description">"자비스" 또는 "JARVIS"라고 말하면 반응합니다.<br>아래 버튼을 클릭하여 시작해주세요.</div>
            <button class="permission-button" id="permissionButton">🎤 음성 인식 시작</button>
        </div>
    </div>

    <div class="container">
        <div class="title">JARVIS</div>
        <div class="status-indicator" id="statusIndicator"></div>
        <div class="content">
            <div class="particle-sphere">
                <canvas id="particleCanvas"></canvas>
            </div>
            <div class="response-text" id="responseText">
                Welcome home, sir.<br>
                다시 오셨군요?
            </div>
        </div>
        <div class="hint" id="hint">🎤 "자비스" 라고 말해보세요!</div>
        <div class="input-text" id="inputText">🎤 음성 인식 준비 중...</div>
        <div class="frequency-bar" id="frequencyBar"></div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 300;
        const sphereRadius = 120;

        class Particle {
            constructor() {
                const phi = Math.acos(Math.random() * 2 - 1);
                const theta = Math.random() * Math.PI * 2;
                this.x = sphereRadius * Math.sin(phi) * Math.cos(theta);
                this.y = sphereRadius * Math.sin(phi) * Math.sin(theta);
                this.z = sphereRadius * Math.cos(phi);
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.vz = (Math.random() - 0.5) * 0.5;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.z += this.vz;
                const distance = Math.sqrt(this.x * this.x + this.y * this.y + this.z * this.z);
                if (distance > sphereRadius) {
                    const scale = sphereRadius / distance;
                    this.x *= scale;
                    this.y *= scale;
                    this.z *= scale;
                    this.vx *= -0.8;
                    this.vy *= -0.8;
                    this.vz *= -0.8;
                }
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.vz *= 0.98;
                this.opacity += (Math.random() - 0.5) * 0.1;
                this.opacity = Math.max(0.2, Math.min(1, this.opacity));
            }

            draw(centerX, centerY, rotationAngle) {
                let rotX = this.x;
                let rotY = this.y * Math.cos(rotationAngle) - this.z * Math.sin(rotationAngle);
                let rotZ = this.y * Math.sin(rotationAngle) + this.z * Math.cos(rotationAngle);
                const screenX = centerX + rotX;
                const screenY = centerY + rotY;
                const zFactor = (rotZ + sphereRadius) / (sphereRadius * 2);
                const finalSize = this.size * (0.5 + zFactor * 0.5);
                const finalOpacity = this.opacity * (0.3 + zFactor * 0.7);
                ctx.fillStyle = `rgba(0, 212, 255, ${finalOpacity})`;
                ctx.shadowColor = `rgba(0, 212, 255, ${finalOpacity})`;
                ctx.shadowBlur = 10;
                ctx.beginPath();
                ctx.arc(screenX, screenY, finalSize, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        let rotationAngle = 0;
        let isReacting = false;

        function animate() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.sort((a, b) => a.z - b.z);
            particles.forEach(particle => {
                particle.update();
                particle.draw(centerX, centerY, rotationAngle);
            });
            if (!isReacting) {
                rotationAngle += 0.003;
            } else {
                rotationAngle += 0.03;
            }
            requestAnimationFrame(animate);
        }
        animate();

        const responseText = document.getElementById('responseText');
        const inputText = document.getElementById('inputText');
        const statusIndicator = document.getElementById('statusIndicator');
        const hint = document.getElementById('hint');
        const permissionModal = document.getElementById('permissionModal');
        const permissionButton = document.getElementById('permissionButton');

        const responses = [
            'Welcome home, sir. 다시 오셨군요?',
            '준비되었습니다.',
            '명령을 기다리고 있습니다.',
            '모든 시스템 정상입니다.',
            '당신의 요청을 처리 중입니다.',
            '무엇을 도와드릴까요?',
            '기뻐합니다.',
            '작동 중입니다.',
            '감지했습니다.',
            '시스템 활성화.',
            '응답합니다.'
        ];

        let recognition;
        let isListening = false;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            inputText.textContent = '🎤 이 브라우저는 음성 인식을 지원하지 않습니다';
            permissionModal.classList.remove('hidden');
        }

        function initVoiceRecognition() {
            recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = true;
            recognition.interimResults = true;

            recognition.onstart = () => {
                isListening = true;
                inputText.textContent = '🎤 듣는 중...';
                statusIndicator.classList.add('listening');
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = event.resultIndex; i < event.results.length; i++) {
                    const transcript = event.results[i].transcript;
                    if (event.results[i].isFinal) {
                        finalTranscript += transcript;
                    } else {
                        interimTranscript += transcript;
                    }
                }

                const fullText = finalTranscript || interimTranscript;
                inputText.textContent = `🎤 인식됨: ${fullText}`;

                // "자비스" 또는 "JARVIS" 감지
                const lowerText = fullText.toLowerCase().trim();
                if (finalTranscript && (lowerText.includes('자비스') || lowerText.includes('jarvis'))) {
                    handleVoiceCommand(fullText);
                }
            };

            recognition.onerror = (event) => {
                console.error('음성 인식 오류:', event.error);
                let errorMessage = event.error;
                
                // 오류 메시지 번역
                const errorMap = {
                    'network': '네트워크 오류 - 인터넷 연결을 확인하세요',
                    'audio': '마이크 오류 - 마이크 설정을 확인하세요',
                    'not-allowed': '마이크 권한이 거부되었습니다',
                    'no-speech': '음성이 감지되지 않았습니다',
                    'service-not-allowed': '서비스가 허용되지 않습니다'
                };
                
                const displayMessage = errorMap[event.error] || `오류: ${event.error}`;
                inputText.textContent = `⚠️ ${displayMessage}`;
            };

            recognition.onend = () => {
                isListening = false;
                statusIndicator.classList.remove('listening');
                inputText.textContent = '🎤 대기 중...';
                // 자동으로 다시 시작
                setTimeout(() => {
                    if (!isReacting) {
                        recognition.start();
                    }
                }, 500);
            };

            recognition.start();
            permissionModal.classList.add('hidden');
            inputText.textContent = '🎤 대기 중...';
        }

        function handleVoiceCommand(transcript) {
            isReacting = true;
            statusIndicator.classList.add('listening');
            const response = responses[Math.floor(Math.random() * responses.length)];
            responseText.textContent = response;
            inputText.textContent = `🗣️ ${transcript}`;

            setTimeout(() => {
                isReacting = false;
                statusIndicator.classList.remove('listening');
                inputText.textContent = '🎤 대기 중...';
            }, 2000);
        }

        permissionButton.addEventListener('click', initVoiceRecognition);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        permissionModal.classList.remove('hidden');
    </script>
</body>
</html>
